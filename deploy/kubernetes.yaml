# Example manifests for GHCR image. Replace YOUR_ORG/YOUR_REPO.
---
apiVersion: v1
kind: Service
metadata:
  name: aviation-brief
spec:
  selector:
    app: aviation-brief
  ports:
    - port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aviation-brief
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aviation-brief
  template:
    metadata:
      labels:
        app: aviation-brief
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
      containers:
        - name: app
          image: ghcr.io/YOUR_ORG/aviation-brief:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
